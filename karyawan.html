<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Karyawan - OTSUKA K3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/sidebar.js"></script> 
</head>
<body>
<div class="sidebar"></div>
    <div class="main">
        <div class="navbar">
            <h2>Data Karyawan</h2>
            <div class="profile">
                Administrator
            </div>
        </div>
        <div class="content">
            <div class="top">
                <button id="openModal">
                    + Tambah Data
                </button>
                <input
                    type="text"
                    id="search"
                    placeholder="Cari karyawan..."
                >
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>NIK</th>
                        <th>Departemen</th>
                        <th>Jabatan</th>
                        <th>Status MCU</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                </tbody>
            </table>
        </div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="judulModal">
                Tambah Data Karyawan
            </h2>
            <input
                type="text"
                id="nama"
                placeholder="Nama Karyawan"
            >
            <input
                type="text"
                id="nik"
                placeholder="NIK"
            >
            <select id="departemen">
                <option value="Produksi">Produksi</option>
                <option value="QA">QA</option>
                <option value="QC">QC</option>
                <option value="HRD">HRD</option>
                <option value="Engineering">Engineering</option>
                <option value="Warehouse">Warehouse</option>
            </select>
            <input
                type="text"
                id="jabatan"
                placeholder="Jabatan"
            >
            <select id="mcu">
                <option value="Fit">
                    Fit
                </option>
                <option value="Fit dengan Catatan">
                    Fit dengan Catatan
                </option>
                <option value="Unfit">
                    Unfit
                </option>
            </select>
            <div
                style="display:flex;justify-content:end;gap:10px;margin-top:10px;"
            >
                <button
                    type="button"
                    onclick="tutupModal()"
                    style="background:#7f8c8d;"
                >
                    Batal
                </button>
                <button
                    type="button"
                    onclick="simpanData()"
                >
                    Simpan
                </button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>document.addEventListener("DOMContentLoaded", () => { initAuth(); });</script>
    <script src="js/karyawan.js"></script>
</body>
</html>
