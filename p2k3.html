<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Struktur P2K3</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="sidebar">

    <h2>OTSUKA K3</h2>

    <ul>

        <li>
            <a href="index.html">🏠 Dashboard</a>
        </li>

        <li>
            <a href="karyawan.html">👥 Data Karyawan</a>
        </li>

        <li class="active">
            <a href="p2k3.html">🏢 Struktur P2K3</a>
        </li>

        <li>
            <a href="dokumen.html">📂 Dokumen K3</a>
        </li>

        <li>
            <a href="pelaksanaan.html">📋 Pelaksanaan SOP</a>
        </li>

        <li>
            <a href="audit.html">📊 Audit</a>
        </li>

        <li>
            <a href="login.html">🚪 Logout</a>
        </li>

    </ul>

</div>

    <div class="main">

        <div class="navbar">

            <h2>Struktur Organisasi P2K3</h2>

            <div class="profile">

                Administrator

            </div>

        </div>

        <div class="content">

            <div class="top">

                <button id="openModal">

                    + Tambah Anggota

                </button>

                <input
                    type="text"
                    id="search"
                    placeholder="Cari anggota..."
                >

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Nama Karyawan</th>

                        <th>Jabatan P2K3</th>

                        <th>Periode</th>

                        <th>Aksi</th>

                    </tr>

                </thead>

                <tbody id="tbody">

                </tbody>

            </table>

        </div>

    </div>

    <div class="modal" id="modal">

        <div class="modal-content">

            <h2>Tambah Anggota P2K3</h2>

            <select id="karyawan">

                <option value="">
                    Pilih Karyawan
                </option>

            </select>

            <select id="jabatan">

                <option value="Ketua">
                    Ketua
                </option>

                <option value="Wakil Ketua">
                    Wakil Ketua
                </option>

                <option value="Sekretaris">
                    Sekretaris
                </option>

                <option value="Anggota">
                    Anggota
                </option>

            </select>

            <input
                type="text"
                id="periode"
                placeholder="Contoh : 2025/2026"
            >

            <button onclick="tambahP2K3()">

                Simpan

            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase-config.js"></script>

    <script src="js/p2k3.js"></script>

</body>

</html>
