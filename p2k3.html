<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Struktur P2K3</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="sidebar" id="sidebar"></div>


<div class="main">
    <div class="navbar">
        <h2>Struktur Organisasi P2K3</h2>
        <div class="profile" id="navbar-profile">Administrator</div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // initAuth() dipanggil oleh auth.js agar badge kanan atas sama seperti halaman lain
            if (typeof initAuth === 'function') initAuth();
        });
    </script>


    <div class="content p2k3-page">
        <div class="p2k3-hero">
            <div>
                <span class="section-label">Komite Keselamatan dan Kesehatan Kerja</span>
                <h3>Struktur Organisasi P2K3</h3>
                <p>
                    Pantau susunan pengurus, periode tugas, dan anggota pendukung dalam satu tampilan struktur yang rapi.
                </p>
            </div>
        </div>

        <div class="org-panel">
            <div class="panel-heading">
                <div>
                    <span class="section-label">Bagan P2K3</span>
                    <h3>Bagan Struktur Pengurus</h3>
                </div>
            </div>

            <div style="width:100%; overflow:auto;">
                <img
                    src="images/struktur_p2k3.png"
                    alt="Struktur P2K3"
                    style="max-width:100%; height:auto; display:block; margin:0 auto;"
                >
            </div>
        </div>
    </div>
</div>

    <script src="js/supabase-config.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/p2k3.js"></script>
</body>
</html>
