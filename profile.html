<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - OTSUKA K3</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="sidebar">
        <h2>OTSUKA K3</h2>
        <ul>
            <li><a href="index.html">🏠 Dashboard</a></li>
            <li><a href="karyawan.html">👥 Data Karyawan</a></li>
            <li><a href="p2k3.html">🏢 Struktur P2K3</a></li>
            <li><a href="dokumen.html">📂 Dokumen K3</a></li>
            <li><a href="pelaksanaan.html">📋 Pelaksanaan SOP</a></li>
            <li><a href="audit.html">📊 Audit</a></li>
            <li class="active"><a href="profile.html">⚙️ Profil Saya</a></li>
        </ul>
    </div>

    <div class="main">

        <div class="navbar">
            <h2>Pengaturan Profil</h2>
            <div class="profile">
                <span id="navbar-profile">Administrator</span>
            </div>
        </div>

        <div class="content">
            <div class="top">
                <h3>Kelola Data Profil Anda</h3>
            </div>

            <!-- Informasi Profil -->
            <div class="table-panel">

                <div class="panel-heading">
                    <span class="section-label">PROFIL SAYA</span>
                    <h3>Informasi Akun</h3>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" id="nama">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" disabled>
                    </div>

                    <div class="form-group">
                        <label>No Handphone</label>
                        <input type="text" id="no_hp">
                    </div>

                    <div class="form-group">
                        <label>Alamat</label>
                        <textarea id="alamat"></textarea>
                    </div>

                    <div class="form-group">
                        <label>NIK</label>
                        <input type="text" id="nik">
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" id="role" disabled>
                    </div>

                    <div class="form-group">
                        <label>Departemen</label>
                        <input type="text" id="departemen">
                    </div>

                    <div class="form-group">
                        <label>Jabatan</label>
                        <input type="text" id="jabatan">
                    </div>

                </div>


                <button onclick="simpanProfil()" class="btn-primary">
                    💾 Simpan Perubahan
                </button>

            </div>


            <!-- Keamanan -->
            <div class="table-panel">

                <div class="panel-heading">
                    <span class="section-label">
                        KEAMANAN AKUN
                    </span>
                    <h3>Ubah Password</h3>
                </div>


                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" id="passwordBaru">
                </div>


                <button onclick="ubahPassword()" class="btn-danger">
                    🔒 Ganti Password
                </button>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase-config.js"></script>
    <script src="js/sidebar.js"></script>

    <script src="js/profile.js"></script>

</body>

</html>
